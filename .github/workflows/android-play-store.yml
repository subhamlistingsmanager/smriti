name: android-play-store

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-submit:
    name: Build and submit Android release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check Expo token
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "Missing EXPO_TOKEN secret. Add it in repo settings before running this workflow."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Verify EAS auth
        run: |
          eas --version
          eas whoami

      - name: Install dependencies
        run: npm ci

      - name: Initialize EAS project
        run: eas project:init --non-interactive --force

      - name: Build and submit to Google Play
        run: eas build --platform android --profile production --non-interactive --auto-submit